<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4" style="max-width: 500px;">

    <h4 class="mb-3">Movie Details</h4>

    <form th:action="@{/movies}" th:object="${movie}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-2">
            <label class="form-label">Title</label>
            <input type="text" th:field="*{title}" class="form-control form-control-sm" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Genre</label>
            <input type="text" th:field="*{genre}" class="form-control form-control-sm" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Director</label>
            <input type="text" th:field="*{director}" class="form-control form-control-sm" required>
        </div>

        <div class="mb-2">
            <label class="form-label">Release Year</label>
            <input type="number" th:field="*{releaseYear}" class="form-control form-control-sm" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rating</label>
            <input type="number" step="0.1" th:field="*{rating}" class="form-control form-control-sm" required>
        </div>

        <div>
            <a th:href="@{/movies}" class="btn btn-secondary btn-sm">Back</a>
            <button type="submit" class="btn btn-success btn-sm">Save</button>
        </div>

    </form>

</div>

</body>
</html>
