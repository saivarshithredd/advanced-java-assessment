<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Movie Management</title>

    <!-- Bootstrap (light usage only) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h3 class="mb-3">Movie Management</h3>

    <div class="mb-3">
        <a th:href="@{/movies/new}" class="btn btn-primary btn-sm">Add Movie</a>
    </div>

    <table class="table table-bordered table-sm">
        <thead class="table-light">
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Genre</th>
            <th>Director</th>
            <th>Year</th>
            <th>Rating</th>
            <th width="150px">Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="movie : ${movies}">
            <td th:text="${movie.id}"></td>
            <td th:text="${movie.title}"></td>
            <td th:text="${movie.genre}"></td>
            <td th:text="${movie.director}"></td>
            <td th:text="${movie.releaseYear}"></td>
            <td th:text="${movie.rating}"></td>
            <td>
                <a th:href="@{/movies/edit/{id}(id=${movie.id})}"
                   class="btn btn-sm btn-warning">Edit</a>

                <a th:href="@{/movies/delete/{id}(id=${movie.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Delete this movie?');">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
